<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Me Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        .profile-pic { width: 96px; height: 96px; object-fit: cover; border-radius: 50%; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-xl rounded-lg p-8 max-w-md w-full text-center">
        <img id="profile-image" class="profile-pic mx-auto mb-4" src="https://via.placeholder.com/96/96/CCCCCC/777777?text=JP" alt="Profile">
        <h1 id="user-name" class="text-3xl font-bold mb-2">John Doe</h1>
        <p id="user-description" class="text-gray-600 mb-6">Thanks for supporting my work!</p>

        <div class="mb-6">
            <label for="tip-amount" class="block text-sm font-medium text-gray-700 mb-2">Tip Amount ($)</label>
            <input type="number" id="tip-amount" value="5.00" min="1.00" step="0.01" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm text-center">
        </div>

        <button id="tip-button" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Send Tip
        </button>

        <div class="mt-6">
            <p class="text-xs text-gray-500">Powered by <a href="https://stripe.com" target="_blank" rel="noopener noreferrer" class="text-indigo-600 hover:underline">Stripe</a></p>
        </div>
    </div>

    <script>
        const stripe = Stripe('pk_test_TYooMQauvdEDq54NiTgbpRQN'); // Replace with your actual publishable key
        const tipButton = document.getElementById('tip-button');
        const tipAmountInput = document.getElementById('tip-amount');
        const userName = document.getElementById('user-name');
        const userDescription = document.getElementById('user-description');
        const profileImage = document.getElementById('profile-image');

        // Load settings from localStorage or use defaults
        const settings = JSON.parse(localStorage.getItem('tipMeSettings')) || {
            name: 'John Doe',
            description: 'Thanks for supporting my work!',
            profilePic: 'https://via.placeholder.com/96/96/CCCCCC/777777?text=JP'
        };
        userName.textContent = settings.name;
        userDescription.textContent = settings.description;
        profileImage.src = settings.profilePic;

        tipButton.addEventListener('click', async () => {
            const amount = parseFloat(tipAmountInput.value) * 100; // Convert to cents
            if (isNaN(amount) || amount < 100) { alert('Please enter a valid amount ($1 minimum).'); return; }

            try {
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount, description: `Tip for ${settings.name}` })
                });
                const session = await response.json();

                const result = await stripe.redirectToCheckout({ sessionId: session.id });
                if (result.error) { alert(result.error.message); }
            } catch (error) { console.error('Error:', error); alert('An error occurred. Please try again.'); }
        });

        // Placeholder for server-side /create-checkout-session endpoint
        // In a real setup, this would be a backend function (e.g., Vercel Serverless Function)
        async function createCheckoutSession(amount, description) {
            // This is a mock. In reality, you'd make a call to your backend.
            console.log('Mocking Stripe Checkout Session creation with:', amount, description);
            return {
                id: 'cs_test_a1WwQ1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1Q1'
            }; // Dummy session ID
        }
    </script>
</body>
</html>
